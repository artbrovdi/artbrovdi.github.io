{{ with .Site.Params.socialIcons }}
<section class="social-icons">

  <!-- Facebook -->
  {{ with .facebook }}

    <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24">

    <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24">

</a>
{{ end }}
